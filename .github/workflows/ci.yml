name: Studio CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: rustup default stable
      - run: npm ci
      - run: npm run test:scripts
      - run: npm run prepare:sidecars -w apps/desktop
      - run: npm run check:sidecars -w apps/desktop
      - run: cargo fmt --all -- --check
      - run: cargo test -p vaexcore-api
      - run: cargo test -p vaexcore-studio-desktop
      - run: npm run typecheck
